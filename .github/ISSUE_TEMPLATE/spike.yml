name: 🔬 Spike / Investigation
description: Time-boxed research to answer an open question. No commitment to ship.
title: "[Spike] "
labels: ["spike"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What do we need to learn or decide?
    validations:
      required: true
  - type: input
    id: timebox
    attributes:
      label: Time-box
      description: e.g. "1 day", "half a sprint"
    validations:
      required: true
  - type: textarea
    id: approach
    attributes:
      label: Approach
      description: How will you investigate? Docs to read, prototypes to build, people to ask.
    validations:
      required: false
  - type: textarea
    id: deliverable
    attributes:
      label: Deliverable
      description: What comes out of this? Doc, prototype, recommendation, follow-up tickets.
    validations:
      required: true
  - type: checkboxes
    id: workstream
    attributes:
      label: Workstream(s)
      options:
        - label: eng
        - label: devops
        - label: product
        - label: design
    validations:
      required: true
